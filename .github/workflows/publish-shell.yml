# Build & push the shell image to GHCR on every main push that touches it
# (DRY-19). Mirrors the aperture/construct-server pattern: Watchtower on the
# prod host pulls :latest on its schedule.
name: publish-shell

on:
  push:
    branches: [main]
    paths:
      - "shell/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/publish-shell.yml"
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: shell/Dockerfile
          push: true
          tags: |
            ghcr.io/einlanzerous/drydock/shell:latest
            ghcr.io/einlanzerous/drydock/shell:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
